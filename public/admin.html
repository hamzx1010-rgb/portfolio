<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura Digital Admin</title>
  <style>
    :root{--accent:#ff007f;--cyan:#00f0ff;--violet:#8b00ff;--bg:#06060f;--panel:#101726;--card:#141432;--border:rgba(255,255,255,.12);--text:#fff;--muted:#9494b8;--danger:#ff5f73}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at top,#1a1f47 0%,#070916 45%,#05070d 100%);color:var(--text)}
    .wrap{max-width:1280px;margin:auto;padding:24px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}.brand{font-size:1.5rem;font-weight:800}.brand span{background:linear-gradient(90deg,var(--cyan),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.muted{color:var(--muted)}
    .panel{background:rgba(16,23,38,.95);border:1px solid var(--border);border-radius:20px;padding:20px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px}.stat{background:rgba(255,255,255,.03);border:1px solid var(--border);padding:16px;border-radius:16px}.stat strong{display:block;font-size:28px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}.field{margin-bottom:12px}.field label{display:block;font-size:12px;letter-spacing:.1em;color:#b8f8ff;margin-bottom:8px}.field input,.field select{width:100%;padding:14px;background:#0a1020;border:1px solid var(--border);border-radius:12px;color:#fff;outline:none}.check{display:flex;gap:10px;align-items:center;margin:14px 0}.row{display:flex;gap:10px;flex-wrap:wrap}.btn{padding:12px 16px;border:none;border-radius:12px;cursor:pointer;font-weight:700}.primary{background:linear-gradient(135deg,var(--accent),var(--violet));color:#fff}.ghost{background:rgba(255,255,255,.04);border:1px solid var(--border);color:#fff}.danger{background:rgba(255,95,115,.12);border:1px solid rgba(255,95,115,.3);color:#ffb5bf}
    .note{margin-top:10px;color:#c7f8ff;font-size:14px}.list{display:grid;gap:14px}.item,.order{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:18px;padding:16px}.item img{width:100%;height:200px;object-fit:cover;border-radius:14px;margin-bottom:12px;background:#0b1220}.itemhead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.price{font-size:24px;font-weight:800}.old{color:#6f7a96;text-decoration:line-through}.small{font-size:13px}.login{max-width:420px;margin:90px auto;background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:24px}.hidden{display:none}@media(max-width:960px){.grid,.stats{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="loginView" class="login">
    <div class="brand">AURA <span>DIGITAL</span></div>
    <p class="muted">Admin dashboard access</p>
    <div class="field"><label>PASSWORD</label><input id="adminPass" type="password" placeholder="1234"></div>
    <button class="btn primary" id="loginBtn" style="width:100%">Access dashboard</button>
    <div class="note">Default password: 1234</div>
  </div>

  <div id="adminView" class="hidden">
    <div class="wrap">
      <div class="top">
        <div><div class="brand">AURA <span>DIGITAL</span></div><div class="muted">Reliable JSON admin workspace</div></div>
        <div class="row"><button class="btn danger" id="logoutBtn">Logout</button></div>
      </div>

      <div class="panel" style="margin-top:20px">
        <h2>System health</h2>
        <div class="stats">
          <div class="stat"><strong id="healthStatus">-</strong><span class="muted">API status</span></div>
          <div class="stat"><strong id="healthProducts">0</strong><span class="muted">Products</span></div>
          <div class="stat"><strong id="healthOrders">0</strong><span class="muted">Orders</span></div>
        </div>
      </div>

      <div class="grid">
        <div class="panel">
          <h2 id="formTitle">Add product</h2>
          <div class="field"><label>NAME</label><input id="name" type="text"></div>
          <div class="field"><label>CATEGORY</label><select id="category"><option>SaaS</option><option>Ecommerce</option><option>Agency</option><option>Portfolio</option><option>Landing Page</option></select></div>
          <div class="field"><label>PRICE (DZD)</label><input id="price" type="number"></div>
          <div class="field"><label>OLD PRICE (DZD)</label><input id="oldPrice" type="number"></div>
          <div class="field"><label>PREVIEW URL</label><input id="previewUrl" type="text"></div>
          <div class="field"><label>IMAGE URL</label><input id="image" type="text"></div>
          <div class="check"><input id="featured" type="checkbox"><label for="featured">Featured product</label></div>
          <div class="row"><button class="btn primary" id="saveBtn">Save product</button><button class="btn ghost" id="resetBtn">Reset</button></div>
          <div class="note" id="formNote"></div>
        </div>

        <div class="panel">
          <h2>Orders</h2>
          <div class="list" id="ordersList"><div class="order">Loading orders...</div></div>
        </div>
      </div>

      <div class="panel" style="margin-top:20px">
        <div class="top" style="margin-bottom:12px"><h2 style="margin:0">Products</h2><button class="btn ghost" id="refreshBtn">Refresh</button></div>
        <div class="list" id="productsList"><div class="item">Loading products...</div></div>
      </div>
    </div>
  </div>

  <script>
    let editingId = null;
    let products = [];

    function formatDZD(value){ return `${Number(value || 0).toLocaleString('fr-DZ')} DZD`; }
    function showAdmin(){ document.getElementById('loginView').classList.add('hidden'); document.getElementById('adminView').classList.remove('hidden'); loadAll(); }
    function resetForm(){ editingId = null; document.getElementById('formTitle').textContent='Add product'; ['name','price','oldPrice','previewUrl','image'].forEach(id => document.getElementById(id).value=''); document.getElementById('category').value='SaaS'; document.getElementById('featured').checked=false; document.getElementById('formNote').textContent=''; }

    async function loadHealth(){
      try{ const res = await fetch('/api/health', { cache:'no-store' }); const data = await res.json(); document.getElementById('healthStatus').textContent = data.ok ? 'ONLINE' : 'OFF'; document.getElementById('healthProducts').textContent = data.products || 0; document.getElementById('healthOrders').textContent = data.orders || 0; }catch(e){ document.getElementById('healthStatus').textContent='ERROR'; }
    }

    async function loadProducts(){
      const box = document.getElementById('productsList');
      try{
        const res = await fetch('/api/admin/products', { cache:'no-store' });
        if(!res.ok) throw new Error('Failed to load products');
        products = await res.json();
        if(!products.length){ box.innerHTML = '<div class="item">No products yet.</div>'; return; }
        box.innerHTML = products.map(item => `
          <div class="item">
            <img src="${item.image || ''}" alt="${item.name}" onerror="this.src='https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=1200&q=80'">
            <div class="itemhead">
              <div>
                <div class="small muted">${item.category}</div>
                <h3>${item.name}</h3>
                <div class="price">${formatDZD(item.price)}</div>
                ${item.oldPrice ? `<div class="old">${formatDZD(item.oldPrice)}</div>` : ''}
                <p class="small muted">${item.featured ? 'Featured' : 'Standard'} • ${item.previewUrl || '#'}</p>
              </div>
              <div class="row"><button class="btn ghost" onclick="editProduct(${item.id})">Edit</button><button class="btn danger" onclick="deleteProduct(${item.id})">Delete</button></div>
            </div>
          </div>`).join('');
      }catch(e){ box.innerHTML = '<div class="item">Could not load products.</div>'; }
    }

    async function loadOrders(){
      const box = document.getElementById('ordersList');
      try{
        const res = await fetch('/api/admin/orders', { cache:'no-store' });
        if(!res.ok) throw new Error('Failed to load orders');
        const orders = await res.json();
        if(!orders.length){ box.innerHTML = '<div class="order">No orders yet.</div>'; return; }
        box.innerHTML = orders.map(order => `
          <div class="order">
            <strong>${order.product}</strong>
            <div class="small muted">${order.customer} • ${order.email || ''}</div>
            <div class="small muted">${order.paymentMethod || 'Card'} • ${order.license || 'Single Site License'}</div>
            <div class="row" style="justify-content:space-between;align-items:center;margin-top:10px"><strong>${formatDZD(order.price)}</strong><button class="btn danger" onclick="deleteOrder('${order.id}')">Delete</button></div>
          </div>`).join('');
      }catch(e){ box.innerHTML = '<div class="order">Could not load orders.</div>'; }
    }

    async function loadAll(){ await Promise.all([loadHealth(), loadProducts(), loadOrders()]); }

    async function saveProduct(){
      const payload = {
        name: document.getElementById('name').value.trim(),
        category: document.getElementById('category').value,
        price: Number(document.getElementById('price').value),
        oldPrice: document.getElementById('oldPrice').value ? Number(document.getElementById('oldPrice').value) : null,
        previewUrl: document.getElementById('previewUrl').value.trim(),
        image: document.getElementById('image').value.trim(),
        featured: document.getElementById('featured').checked
      };
      const note = document.getElementById('formNote');
      if(!payload.name || !payload.category || !Number.isFinite(payload.price)){ note.textContent='Please enter valid product data.'; return; }
      try{
        const res = await fetch(editingId ? `/api/admin/products/${editingId}` : '/api/admin/products', {
          method: editingId ? 'PUT' : 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
        });
        const data = await res.json().catch(()=>({}));
        if(!res.ok) throw new Error(data.error || 'Save failed');
        note.textContent = editingId ? 'Product updated successfully.' : 'Product added successfully.';
        resetForm();
        loadAll();
      }catch(e){ note.textContent = e.message || 'Could not save product.'; }
    }

    function editProduct(id){
      const item = products.find(p => p.id === id); if(!item) return;
      editingId = id;
      document.getElementById('formTitle').textContent='Edit product';
      document.getElementById('name').value=item.name || '';
      document.getElementById('category').value=item.category || 'SaaS';
      document.getElementById('price').value=item.price || '';
      document.getElementById('oldPrice').value=item.oldPrice || '';
      document.getElementById('previewUrl').value=item.previewUrl || '';
      document.getElementById('image').value=item.image || '';
      document.getElementById('featured').checked=!!item.featured;
      document.getElementById('formNote').textContent='Editing selected product.';
      window.scrollTo({ top:0, behavior:'smooth' });
    }

    async function deleteProduct(id){
      if(!confirm('Delete this product?')) return;
      try{ const res = await fetch(`/api/admin/products/${id}`, { method:'DELETE' }); const data = await res.json().catch(()=>({})); if(!res.ok) throw new Error(data.error || 'Delete failed'); loadAll(); }catch(e){ alert(e.message || 'Could not delete product.'); }
    }
    async function deleteOrder(id){
      if(!confirm('Delete this order?')) return;
      try{ const res = await fetch(`/api/admin/orders/${id}`, { method:'DELETE' }); const data = await res.json().catch(()=>({})); if(!res.ok) throw new Error(data.error || 'Delete failed'); loadAll(); }catch(e){ alert(e.message || 'Could not delete order.'); }
    }

    document.getElementById('loginBtn').addEventListener('click', ()=>{ const pass = document.getElementById('adminPass').value; if(pass === '1234') showAdmin(); else alert('Wrong password'); });
    document.getElementById('logoutBtn').addEventListener('click', ()=>location.reload());
    document.getElementById('saveBtn').addEventListener('click', saveProduct);
    document.getElementById('resetBtn').addEventListener('click', resetForm);
    document.getElementById('refreshBtn').addEventListener('click', loadAll);
  </script>

  </script>
</body>
</html>
