<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - TemplateFolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="loginScreen" class="admin-login-screen">
    <div class="admin-login-box">
        <h2>Admin Login</h2>
        <p>Enter your password to access the dashboard</p>
        <input type="password" id="adminPassword" placeholder="Password">
        <button class="btn btn-main" id="loginBtn">Login</button>
        <p id="loginError" class="error"></p>
    </div>
</div>

<div id="adminDashboard" class="hidden">
    <header class="admin-header">
        <div class="container">
            <a href="/" class="brand">TemplateFolio</a>
            <button class="btn btn-secondary" id="logoutBtn">Logout</button>
        </div>
    </header>

    <main class="container admin-main">
        <section class="admin-section">
            <h2>Add New Template</h2>
            <form id="addProductForm" class="admin-form">
                <div>
                    <label>Template Name</label>
                    <input type="text" id="productName" required placeholder="e.g. Modern Clothing Store">
                </div>
                <div>
                    <label>Category</label>
                    <select id="productCategory" required>
                        <option value="Clothing Store">Clothing Store</option>
                        <option value="University">University</option>
                        <option value="Portfolio">Portfolio</option>
                        <option value="Business">Business</option>
                        <option value="E-commerce">E-commerce</option>
                    </select>
                </div>
                <div class="row">
                    <div>
                        <label>Price (DZD)</label>
                        <input type="number" id="productPrice" required min="0" placeholder="5000">
                    </div>
                    <div>
                        <label>Old Price (DZD)</label>
                        <input type="number" id="productOld" min="0" placeholder="10000">
                    </div>
                    <div>
                        <label>Discount (%)</label>
                        <input type="number" id="productDiscount" min="0" max="100" placeholder="50">
                    </div>
                </div>
                <div>
                    <label>Template Images (up to 5)</label>
                    <input type="file" id="productImages" accept="image/*" multiple required>
                    <div class="preview-grid" id="imagePreview"></div>
                </div>
                <button type="submit" class="btn btn-main btn-block">Add Template</button>
            </form>
        </section>

        <section class="admin-section">
            <h2>Your Templates</h2>
            <div id="adminProducts" class="admin-products"></div>
        </section>

        <section class="admin-section">
            <h2>Customer Orders</h2>
            <div id="adminOrders" class="admin-orders"></div>
        </section>
    </main>
</div>

<script src="admin.js"></script>
