<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TemplateFolio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="admin-login-screen">
    <div class="admin-login-box">
        <div style="margin-bottom: 1.5rem;">
            <span class="logo-symbol" style="margin: 0 auto;">◆</span>
        </div>
        <h2>Admin Login</h2>
        <p>Enter your password to access the dashboard</p>
        <input type="password" id="adminPassword" placeholder="Password">
        <button class="btn-primary" id="loginBtn" style="width: 100%; margin-top: 0.5rem;">Login</button>
        <p id="loginError" class="error"></p>
    </div>
</div>

<!-- Admin Dashboard -->
<div id="adminDashboard" class="hidden">
    <header class="admin-header">
        <div class="container">
            <div class="logo">
                <span class="logo-symbol">◆</span>
                <span>TemplateFolio Admin</span>
            </div>
            <button class="btn-secondary" id="logoutBtn">Logout</button>
        </div>
    </header>

    <main class="container admin-main">
        <!-- Add Template -->
        <section class="admin-section">
            <h2>Add New Template</h2>
            <form id="addProductForm" class="admin-form">
                <div class="form-row">
                    <div class="form-field">
                        <label>Template Name</label>
                        <input type="text" id="productName" required placeholder="e.g. Modern Clothing Store">
                    </div>
                    <div class="form-field">
                        <label>Category</label>
                        <select id="productCategory" required>
                            <option value="Clothing Store">Clothing Store</option>
                            <option value="University">University</option>
                            <option value="Portfolio">Portfolio</option>
                            <option value="Business">Business</option>
                            <option value="E-commerce">E-commerce</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-field">
                        <label>Price (DZD)</label>
                        <input type="number" id="productPrice" required min="0" placeholder="e.g. 5000">
                    </div>
                    <div class="form-field">
                        <label>Old Price (DZD)</label>
                        <input type="number" id="productOld" min="0" placeholder="e.g. 10000">
                    </div>
                    <div class="form-field">
                        <label>Discount (%)</label>
                        <input type="number" id="productDiscount" min="0" max="100" placeholder="e.g. 50">
                    </div>
                </div>
                <div class="form-field">
                    <label>Template Images (up to 5)</label>
                    <input type="file" id="productImages" accept="image/*" multiple required>
                    <div class="image-preview-grid" id="imagePreview"></div>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Add Template</button>
            </form>
        </section>

        <!-- Templates List -->
        <section class="admin-section">
            <h2>Your Templates</h2>
            <div id="adminProducts" class="admin-products"></div>
        </section>

        <!-- Orders List -->
        <section class="admin-section">
            <h2>Customer Orders</h2>
            <div id="adminOrders" class="admin-orders"></div>
        </section>
    </main>
</div>

<script src="admin.js"></script>

</html>
